apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 2 # <-- High Availability enabled
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0          # Do not try to create extra pods above 2
      maxUnavailable: 1    # Shut down 1 pod first to free up 0.5 vCPU / 2Gi RAM
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      # --- THE SPOT INSTANCE HA CHEAT CODE ---
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Release.Name }}
              topologyKey: "kubernetes.io/hostname"
      # ---------------------------------------
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Chart.Version }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"   # <-- 0.5 vCPU
              memory: "2Gi"
            limits:
              cpu: "500m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          env:
            - name: REDIS_ADDR
              value: "pisces-gateway-redis-svc.default.svc.cluster.local:6379"
            - name: LOGGING_LEVEL
              value: {{ .Values.env.LOGGING_LEVEL | quote }}
            - name: FRASIER_BOT_URL
              value: {{ .Values.env.FRASIER_BOT_URL | quote }}
            - name: GEMINI_PROJECT
              value: {{ .Values.gemini.project | quote }}
            - name: GEMINI_LOCATION
              value: {{ .Values.gemini.location | quote }}
            - name: GEMINI_MODEL
              value: {{ .Values.gemini.model | quote }}            
            - name: EMBEDDING_MODEL
              value: {{ .Values.gemini.embedding_model | quote }}
            - name: GEMMA_BASE_URL
              value: {{ .Values.gemma.base_url | quote }}
            - name: GEMMA_MODEL
              value: {{ .Values.gemma.model | quote }}